# STT
stt_model: small

# VAD
vad_threshold: 300
silence_cutoff: 1.8

# ── LLM backend ──────────────────────────────────────────────────────────────
# Auto-detected from env vars. Set one to switch away from local Ollama.
#
#   export ANTHROPIC_API_KEY=...   → claude-sonnet-4-20250514
#   export OPENAI_API_KEY=...      → gpt-4o
#   export GEMINI_API_KEY=...      → gemini-2.0-flash
#
# Priority: Anthropic → OpenAI → Gemini → Ollama

llm_backend: ollama

# Ollama local model defaults (used only when no API key is set)
ollama_chat_model: "qwen2.5:7b"
ollama_code_model: "qwen2.5-coder:7b"